<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>The Frequency Orb — Tune In</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;600&family=Share+Tech+Mono&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    color: #ccc;
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    cursor: crosshair;
    user-select: none;
    -webkit-user-select: none;
  }

  canvas#bgCanvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
  }

  .overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }

  .overlay > * { pointer-events: auto; }

  /* TOP BAR */
  .top-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 20;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 24px;
    pointer-events: none;
  }

  .top-bar > * { pointer-events: auto; }

  .brand {
    font-family: 'Oswald', sans-serif;
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.25);
  }

  .brand a {
    color: rgba(255,255,255,0.25);
    text-decoration: none;
    transition: color 0.3s;
  }

  .brand a:hover { color: rgba(255,255,255,0.5); }

  .schumann {
    font-size: 10px;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.2);
    text-shadow: 0 0 8px rgba(78,205,196,0.3);
  }

  /* ORB CONTAINER */
  .orb-wrapper {
    position: relative;
    width: 280px;
    height: 280px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  .orb {
    width: 180px;
    height: 180px;
    border-radius: 50%;
    position: relative;
    transition: all 0.5s ease;
  }

  .orb-core {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 80px;
    height: 80px;
    border-radius: 50%;
    filter: blur(1px);
  }

  .orb-mid {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 130px;
    height: 130px;
    border-radius: 50%;
    opacity: 0.5;
    filter: blur(8px);
  }

  .orb-outer {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 180px;
    height: 180px;
    border-radius: 50%;
    opacity: 0.25;
    filter: blur(20px);
  }

  .orb-glow {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 260px;
    height: 260px;
    border-radius: 50%;
    opacity: 0.08;
    filter: blur(40px);
  }

  .orb-ring {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 200px;
    height: 200px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.05);
  }

  /* TEXT ELEMENTS */
  .tune-in {
    font-family: 'Oswald', sans-serif;
    font-size: 14px;
    font-weight: 300;
    letter-spacing: 8px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    margin-top: 40px;
    transition: all 0.5s;
    text-align: center;
    text-shadow: 0 0 10px rgba(255,255,255,0.05);
  }

  .tune-in.active {
    color: rgba(255,255,255,0.7);
    text-shadow: 0 0 15px rgba(255,255,255,0.15);
  }

  .frequency-display {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: rgba(255,255,255,0.25);
    margin-top: 8px;
    letter-spacing: 2px;
    text-align: center;
    transition: all 0.5s;
  }

  .frequency-display.active {
    color: rgba(78,205,196,0.7);
    text-shadow: 0 0 12px rgba(78,205,196,0.3);
  }

  .instruction {
    font-size: 10px;
    color: rgba(255,255,255,0.3);
    margin-top: 24px;
    letter-spacing: 3px;
    text-transform: uppercase;
    text-align: center;
    animation: fadeInOut 4s ease-in-out infinite;
  }

  @keyframes fadeInOut {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }

  /* BOTTOM BAR */
  .bottom-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 20;
    padding: 16px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    pointer-events: none;
  }

  .bottom-bar > * { pointer-events: auto; }

  /* THREAT SLIDER */
  .slider-container {
    display: flex;
    align-items: center;
    gap: 12px;
    opacity: 0;
    transition: opacity 0.5s;
  }

  .slider-container.visible { opacity: 1; }

  .slider-label {
    font-size: 8px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
    width: 60px;
    text-align: center;
  }

  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 200px;
    height: 2px;
    background: rgba(255,255,255,0.15);
    outline: none;
    opacity: 0.7;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: rgba(255,255,255,0.4);
    cursor: pointer;
    border: 1px solid rgba(255,255,255,0.5);
  }

  .status-text {
    font-family: 'Oswald', sans-serif;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    transition: all 0.5s;
    text-shadow: 0 0 10px rgba(255,255,255,0.1);
  }

  .coming-soon {
    font-size: 9px;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.2);
    text-transform: uppercase;
  }

  .coming-soon a {
    color: rgba(78,205,196,0.5);
    text-decoration: none;
    border-bottom: 1px solid rgba(78,205,196,0.2);
    transition: all 0.3s;
  }

  .coming-soon a:hover {
    color: rgba(78,205,196,0.8);
    border-color: rgba(78,205,196,0.5);
  }
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<div class="top-bar">
  <div class="brand"><a href="https://frequencyframework.org">The Frequency Framework</a></div>
  <div class="schumann" id="schumannDisplay">7.83 Hz</div>
</div>

<div class="overlay">
  <div class="orb-wrapper" id="orbWrapper" onclick="toggleAudio()">
    <div class="orb-glow" id="orbGlow"></div>
    <div class="orb-outer" id="orbOuter"></div>
    <div class="orb-ring" id="orbRing"></div>
    <div class="orb-mid" id="orbMid"></div>
    <div class="orb-core" id="orbCore"></div>
  </div>
  <div class="tune-in" id="tuneIn">Tune In</div>
  <div class="frequency-display" id="freqDisplay">432 Hz · Schumann Resonance</div>
  <div class="instruction" id="instruction">Touch the orb to begin</div>
</div>

<div class="bottom-bar">
  <div class="slider-container" id="sliderContainer">
    <span class="slider-label">Baseline</span>
    <input type="range" id="threatSlider" min="0" max="100" value="65" oninput="updateThreat(this.value)">
    <span class="slider-label">Critical</span>
  </div>
  <div class="status-text" id="statusText">ELEVATED — 10 ACTIVE THEATERS</div>
  <div class="coming-soon">Full experience coming soon · <a href="https://frequencyframework.org/tools/">Explore tools</a></div>
</div>

<script>
// ============================================================
// AUDIO ENGINE — 432 Hz base with Schumann modulation
// ============================================================
let audioCtx = null;
let oscillatorL = null;
let oscillatorR = null;
let gainNode = null;
let lfoGain = null;
let isPlaying = false;
let currentThreat = 65;

function initAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  const merger = audioCtx.createChannelMerger(2);

  oscillatorL = audioCtx.createOscillator();
  oscillatorL.type = 'sine';
  oscillatorL.frequency.value = 432;
  const gainL = audioCtx.createGain();
  gainL.gain.value = 0.12;
  oscillatorL.connect(gainL);
  gainL.connect(merger, 0, 0);

  oscillatorR = audioCtx.createOscillator();
  oscillatorR.type = 'sine';
  oscillatorR.frequency.value = 432 + 7.83;
  const gainR = audioCtx.createGain();
  gainR.gain.value = 0.12;
  oscillatorR.connect(gainR);
  gainR.connect(merger, 0, 1);

  const subOsc = audioCtx.createOscillator();
  subOsc.type = 'sine';
  subOsc.frequency.value = 108;
  const subGain = audioCtx.createGain();
  subGain.gain.value = 0.04;
  subOsc.connect(subGain);
  subGain.connect(merger, 0, 0);
  subGain.connect(merger, 0, 1);

  gainNode = audioCtx.createGain();
  gainNode.gain.value = 0;

  const lfo = audioCtx.createOscillator();
  lfo.type = 'sine';
  lfo.frequency.value = 7.83 / (2 * Math.PI);
  lfoGain = audioCtx.createGain();
  lfoGain.gain.value = 0.03;
  lfo.connect(lfoGain);
  lfoGain.connect(gainNode.gain);

  merger.connect(gainNode);
  gainNode.connect(audioCtx.destination);

  oscillatorL.start();
  oscillatorR.start();
  subOsc.start();
  lfo.start();
}

function toggleAudio() {
  if (!isPlaying) {
    if (!audioCtx) initAudio();
    if (audioCtx.state === 'suspended') audioCtx.resume();

    gainNode.gain.cancelScheduledValues(audioCtx.currentTime);
    gainNode.gain.setValueAtTime(gainNode.gain.value, audioCtx.currentTime);
    gainNode.gain.linearRampToValueAtTime(0.15, audioCtx.currentTime + 2);

    isPlaying = true;
    document.getElementById('tuneIn').classList.add('active');
    document.getElementById('freqDisplay').classList.add('active');
    document.getElementById('instruction').textContent = 'Touch again to silence';
    document.getElementById('sliderContainer').classList.add('visible');
  } else {
    gainNode.gain.cancelScheduledValues(audioCtx.currentTime);
    gainNode.gain.setValueAtTime(gainNode.gain.value, audioCtx.currentTime);
    gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1.5);

    isPlaying = false;
    document.getElementById('tuneIn').classList.remove('active');
    document.getElementById('freqDisplay').classList.remove('active');
    document.getElementById('instruction').textContent = 'Touch the orb to begin';
  }
}

// ============================================================
// THREAT LEVEL
// ============================================================
const threatColors = {
  core: [
    { r: 77, g: 205, b: 196 },
    { r: 255, g: 217, b: 61 },
    { r: 255, g: 60, b: 60 }
  ]
};

function lerpColor(c1, c2, t) {
  return {
    r: Math.round(c1.r + (c2.r - c1.r) * t),
    g: Math.round(c1.g + (c2.g - c1.g) * t),
    b: Math.round(c1.b + (c2.b - c1.b) * t)
  };
}

function getThreatColor(value) {
  const t = value / 100;
  if (t <= 0.5) {
    return lerpColor(threatColors.core[0], threatColors.core[1], t * 2);
  } else {
    return lerpColor(threatColors.core[1], threatColors.core[2], (t - 0.5) * 2);
  }
}

function updateThreat(value) {
  currentThreat = parseInt(value);
  const color = getThreatColor(currentThreat);
  const rgb = `${color.r}, ${color.g}, ${color.b}`;

  document.getElementById('orbCore').style.background = `radial-gradient(circle, rgba(${rgb}, 0.9), rgba(${rgb}, 0.4))`;
  document.getElementById('orbMid').style.background = `radial-gradient(circle, rgba(${rgb}, 0.5), transparent)`;
  document.getElementById('orbOuter').style.background = `radial-gradient(circle, rgba(${rgb}, 0.3), transparent)`;
  document.getElementById('orbGlow').style.background = `radial-gradient(circle, rgba(${rgb}, 0.15), transparent)`;
  document.getElementById('orbRing').style.borderColor = `rgba(${rgb}, 0.1)`;

  let status = '';
  if (currentThreat < 20) status = 'BASELINE — NOMINAL';
  else if (currentThreat < 40) status = 'GUARDED — MONITORING';
  else if (currentThreat < 60) status = 'ELEVATED — PATTERNS DETECTED';
  else if (currentThreat < 80) status = 'HIGH — 10 ACTIVE THEATERS';
  else status = 'CRITICAL — CONVERGENCE';

  const statusEl = document.getElementById('statusText');
  statusEl.textContent = status;
  statusEl.style.color = `rgba(${rgb}, 0.8)`;
  statusEl.style.textShadow = `0 0 15px rgba(${rgb}, 0.4)`;

  if (isPlaying && oscillatorL && oscillatorR) {
    const freqShift = currentThreat * 0.5;
    oscillatorL.frequency.setValueAtTime(432 + freqShift, audioCtx.currentTime);
    oscillatorR.frequency.setValueAtTime(432 + freqShift + 7.83 + (currentThreat * 0.05), audioCtx.currentTime);

    const displayFreq = (432 + freqShift).toFixed(1);
    const beatFreq = (7.83 + currentThreat * 0.05).toFixed(2);
    document.getElementById('freqDisplay').textContent = `${displayFreq} Hz · ${beatFreq} Hz beat`;
    document.getElementById('schumannDisplay').textContent = `${beatFreq} Hz`;
  }
}

// ============================================================
// PARTICLE BACKGROUND
// ============================================================
const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');
let particles = [];
let animFrame;

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

window.addEventListener('resize', resize);
resize();

class Particle {
  constructor() {
    this.reset();
  }

  reset() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.size = Math.random() * 1.5 + 0.3;
    this.speedX = (Math.random() - 0.5) * 0.15;
    this.speedY = (Math.random() - 0.5) * 0.15;
    this.opacity = Math.random() * 0.3 + 0.05;
    this.pulseSpeed = Math.random() * 0.02 + 0.005;
    this.pulseOffset = Math.random() * Math.PI * 2;
  }

  update(time) {
    this.x += this.speedX + (Math.sin(time * 0.0003 + this.pulseOffset) * 0.05);
    this.y += this.speedY + (Math.cos(time * 0.0004 + this.pulseOffset) * 0.05);

    const schumann = Math.sin(time * 0.00783 * 2 * Math.PI / 1000 + this.pulseOffset);
    this.currentOpacity = this.opacity * (0.7 + 0.3 * schumann);

    const threatFactor = currentThreat / 100;
    this.speedX += (Math.random() - 0.5) * 0.01 * threatFactor;
    this.speedY += (Math.random() - 0.5) * 0.01 * threatFactor;

    if (this.x < -10 || this.x > canvas.width + 10 ||
        this.y < -10 || this.y > canvas.height + 10) {
      this.reset();
    }
  }

  draw() {
    const color = getThreatColor(currentThreat);
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${color.r}, ${color.g}, ${color.b}, ${this.currentOpacity})`;
    ctx.fill();
  }
}

function initParticles() {
  const count = 80 + Math.floor(currentThreat * 1.2);
  while (particles.length < count) {
    particles.push(new Particle());
  }
}

initParticles();

function drawConnections(time) {
  const maxDist = 80 + currentThreat * 0.5;
  const color = getThreatColor(currentThreat);

  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < maxDist) {
        const opacity = (1 - dist / maxDist) * 0.06 * (currentThreat / 50);
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.strokeStyle = `rgba(${color.r}, ${color.g}, ${color.b}, ${opacity})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
    }
  }
}

// ============================================================
// ORB PULSE ANIMATION
// ============================================================
function pulseOrb(time) {
  const schumannPhase = Math.sin(time * 7.83 * 2 * Math.PI / 1000);
  const breathPhase = Math.sin(time * 0.001);
  const threatFactor = currentThreat / 100;

  const scale = 1 + (schumannPhase * 0.008 * (1 + threatFactor)) + (breathPhase * 0.02);
  const wrapper = document.getElementById('orbWrapper');
  wrapper.style.transform = `scale(${scale})`;

  const ring = document.getElementById('orbRing');
  ring.style.transform = `translate(-50%, -50%) rotate(${time * 0.01}deg)`;
  ring.style.width = `${200 + schumannPhase * 5 * (1 + threatFactor)}px`;
  ring.style.height = `${200 + schumannPhase * 5 * (1 + threatFactor)}px`;
}

// ============================================================
// MAIN ANIMATION LOOP
// ============================================================
function animate(time) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const gradient = ctx.createRadialGradient(
    canvas.width / 2, canvas.height / 2, canvas.height * 0.2,
    canvas.width / 2, canvas.height / 2, canvas.height * 0.8
  );
  gradient.addColorStop(0, 'rgba(0,0,0,0)');
  gradient.addColorStop(1, 'rgba(0,0,0,0.4)');
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  particles.forEach(p => {
    p.update(time);
    p.draw();
  });

  drawConnections(time);
  pulseOrb(time);

  const targetCount = 80 + Math.floor(currentThreat * 1.2);
  if (particles.length < targetCount) {
    particles.push(new Particle());
  } else if (particles.length > targetCount + 20) {
    particles.pop();
  }

  animFrame = requestAnimationFrame(animate);
}

animate(0);
updateThreat(65);
</script>
</body>
</html>
